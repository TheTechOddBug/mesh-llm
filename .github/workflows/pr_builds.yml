name: PR Builds

# Set USE_SELF_HOSTED=true to route CUDA matrix rows to the dedicated NVIDIA
# runner; unset or false uses GitHub-hosted runners.

on:
  workflow_dispatch:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read
  packages: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  CACHE_NAMESPACE: mesh-llm
  MODEL_URL: https://huggingface.co/unsloth/SmolLM2-135M-Instruct-GGUF/resolve/9e6855bc4be717fca1ef21360a1db4b29d5c559a/SmolLM2-135M-Instruct-Q8_0.gguf
  MODEL_FILE: SmolLM2-135M-Instruct-Q8_0.gguf
  CARGO_INCREMENTAL: "0"
  CARGO_NET_RETRY: "10"
  CARGO_HTTP_MULTIPLEXING: "false"
  SCCACHE_GHA_ENABLED: "true"
  LLAMA_STAGE_BUILD_DIR: .deps/llama.cpp/build-stage-abi-static

jobs:
  changes:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      pull-requests: read
    outputs:
      rust: ${{ steps.filter.outputs.rust }}
      ui: ${{ steps.filter.outputs.ui }}
      benchmarks: ${{ steps.filter.outputs.benchmarks }}
      sdk: ${{ steps.filter.outputs.sdk }}
      nodejs_release: ${{ steps.filter.outputs.nodejs_release }}
      windows_cpu: ${{ steps.compute.outputs.windows_cpu_build_required }}
      windows_gpu: ${{ steps.compute.outputs.windows_gpu_build_required }}
      docs: ${{ steps.filter.outputs.docs }}
      affected_crates: ${{ steps.compute.outputs.affected_crates }}
      test_crates: ${{ steps.compute.outputs.test_crates }}
      batches_json: ${{ steps.compute.outputs.batches_json }}
      test_batches_json: ${{ steps.compute.outputs.test_batches_json }}
      all_rust: ${{ steps.compute.outputs.all_rust }}
      docs_only: ${{ steps.compute.outputs.docs_only }}
      rust_changed: ${{ steps.compute.outputs.rust_changed }}
      website_changed: ${{ steps.compute.outputs.website_changed }}
      backend_changed: ${{ steps.compute.outputs.backend_changed }}
      inference_artifact_required: ${{ steps.compute.outputs.inference_artifact_required }}
      backend_recipe_changed: ${{ steps.compute.outputs.backend_recipe_changed }}
      sdk_smoke_required: ${{ steps.compute.outputs.sdk_smoke_required }}
      ui_dist_cache_key: ${{ steps.ui_key.outputs.ui_dist_cache_key }}
      linux_inference_artifact_required: ${{ github.event_name == 'workflow_dispatch' || steps.compute.outputs.inference_artifact_required == 'true' }}
      macos_inference_artifact_required: ${{ github.event_name == 'workflow_dispatch' || steps.compute.outputs.inference_artifact_required == 'true' || steps.filter.outputs.benchmarks == 'true' }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            rust:
              - 'crates/**'
              - 'tools/xtask/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - 'Justfile'
              - 'scripts/**'
              - 'third_party/llama.cpp/**'
              - '.github/cache-version.txt'
              - '.github/workflows/pr_builds.yml'
              - '.github/workflows/pr_quality.yml'
              - '.github/workflows/smoke.yml'

            ui:
              - 'crates/mesh-llm-ui/**'
            benchmarks:
              - 'crates/skippy-bench/**'
              - 'crates/llama-spec-bench/**'
              - 'crates/mesh-llm-gpu-bench/**'
            sdk:
              - 'crates/mesh-llm-api-client/**'
              - 'crates/mesh-llm-api-server/**'
              - 'crates/mesh-llm-config/**'
              - 'crates/mesh-llm-commands/**'
              - 'crates/mesh-llm-events/**'
              - 'crates/mesh-llm-hardware-profile/**'
              - 'crates/mesh-llm-runtime-install/**'
              - 'crates/mesh-llm-sdk/**'
              - 'crates/mesh-llm-cli/**'
              - 'crates/mesh-llm-embedded-runtime/**'
              - 'crates/mesh-llm-tui/**'
              - 'crates/mesh-llm-console-server/**'
              - 'crates/mesh-llm-ffi/**'
              - 'crates/mesh-llm-nodejs/**'
              - 'crates/mesh-client/**'
              - 'crates/mesh-llm-identity/**'
              - 'crates/mesh-llm-native-runtime/**'
              - 'crates/mesh-llm-protocol/**'
              - 'crates/mesh-llm-routing/**'
              - 'crates/mesh-llm-types/**'
              - 'sdk/**'
              - 'Package.swift'
              - 'scripts/ci-rust-sdk-smoke.sh'
              - 'scripts/ci-prepare-native-runtime.sh'
              - 'scripts/ci-install-native-runtime.sh'
              - 'scripts/package-sdk-console-assets.sh'
              - 'scripts/verify-sdk-console-assets.sh'
              - 'scripts/ci-kotlin-sdk-smoke.sh'
              - 'scripts/ci-swift-sdk-smoke.sh'
              - 'scripts/ci-sdk-fixture.sh'
            nodejs_release:
              - 'crates/mesh-llm-nodejs/**'
            windows_cpu:
              - 'crates/mesh-llm-nodejs/**'
              - 'crates/skippy-ffi/**'
              - 'scripts/build-windows.ps1'
              - 'third_party/llama.cpp/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - '.github/cache-version.txt'
            docs:
              - 'docs/**'
              - '**.md'
              - '!crates/**'
              - '!third_party/**'
      - id: compute
        uses: ./.github/actions/compute-changes
        with:
          event_name: ${{ github.event_name }}
          base_sha: ${{ github.event.pull_request.base.sha || '' }}
          head_sha: ${{ github.event.pull_request.head.sha || '' }}
      - name: Compute UI dist cache key
        id: ui_key
        run: |
          HASH=$(git ls-files -s crates/mesh-llm-ui .github/cache-version.txt | git hash-object --stdin)
          echo "ui_dist_cache_key=${CACHE_NAMESPACE}-ui-dist-${HASH}" >> "$GITHUB_OUTPUT"

  public_runner_image_contract:
    needs: changes
    name: Runner image / GitHub-hosted public
    runs-on: ubuntu-24.04
    container:
      image: ghcr.io/mesh-llm/mesh-llm-cuda-runner@sha256:8d93de6ba30173e825a16fdecf011f9c632edc6e1259df7289e491b0a05f829d
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    defaults:
      run:
        shell: bash
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: false
      - name: Verify prebuilt public environment
        run: |
          verify-runner-image public
          hf --help >/dev/null
          cargo check -p mesh-llm-config

  arc_runner_image_contract:
    needs: changes
    name: Runner image / ARC ${{ matrix.architecture }}
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        include:
          - architecture: amd64
            runner: mesh-llm-amd64
            machine: x86_64
          - architecture: arm64
            runner: mesh-llm-arm64
            machine: aarch64
    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: false
      - name: Verify prebuilt ARC environment
        env:
          EXPECTED_MACHINE: ${{ matrix.machine }}
        run: |
          test "$(uname -m)" = "$EXPECTED_MACHINE"
          verify-runner-image self-hosted
          cargo check -p mesh-llm-config

  linux_cpu_artifact:
    needs: changes
    if: ${{ needs.changes.outputs.linux_inference_artifact_required == 'true' && needs.changes.outputs.docs_only != 'true' }}
    name: Linux CPU
    runs-on: ubuntu-24.04
    container:
      image: ghcr.io/mesh-llm/mesh-llm-cuda-runner@sha256:8d93de6ba30173e825a16fdecf011f9c632edc6e1259df7289e491b0a05f829d
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    defaults:
      run:
        shell: bash
    env:
      LLAMA_STAGE_BACKEND: cpu
      LLAMA_STAGE_BUILD_DIR: .deps/llama.cpp/build-stage-abi-static
      MESH_LLM_SKIP_UI: "1"
      MESH_LLM_REQUIRE_SCCACHE: "1"
      RUSTC_WRAPPER: sccache
      SCCACHE_GHA_ENABLED: "false"
    steps:
      - uses: actions/checkout@v5

      - name: Verify prebuilt CI environment
        run: verify-runner-image public

      - name: Build UI
        if: ${{ github.event_name == 'workflow_dispatch' || needs.changes.outputs.ui == 'true' }}
        working-directory: crates/mesh-llm-ui
        run: pnpm i --frozen-lockfile && pnpm run build

      - name: Test UI
        if: ${{ github.event_name == 'workflow_dispatch' || needs.changes.outputs.ui == 'true' }}
        working-directory: crates/mesh-llm-ui
        run: pnpm test

      - name: Save UI dist cache
        if: ${{ github.ref == 'refs/heads/main' && needs.changes.outputs.ui == 'true' }}
        uses: actions/cache/save@v4
        with:
          path: crates/mesh-llm-ui/dist
          key: ${{ needs.changes.outputs.ui_dist_cache_key }}

      - name: Configure Linux Rust linker
        run: |
          mkdir -p .cargo
          cat > .cargo/config.toml <<'EOF'
          [target.x86_64-unknown-linux-gnu]
          rustflags = ["-C", "link-arg=-fuse-ld=lld"]
          EOF

      - uses: Swatinem/rust-cache@v2
        continue-on-error: true
        with:
          workspaces: . -> target
          cache-bin: "false"
          prefix-key: ${{ env.CACHE_NAMESPACE }}-rust-${{ runner.os }}-${{ hashFiles('.github/cache-version.txt') }}
          shared-key: linux
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - name: Check release-target repo consistency
        run: cargo run -p xtask -- repo-consistency release-targets

      - name: Check embedded client dependency purity
        run: |
          cargo tree -p mesh-llm-client --prefix=none --no-dedupe > /tmp/mesh-client-deps.txt
          FORBIDDEN="keyring|rpassword|hf-hub|dirs|clap|include_dir|rmcp|keyring-core"
          if grep -E "^[[:space:]│├└─-]*($FORBIDDEN)([[:space:]]|$)" /tmp/mesh-client-deps.txt; then
            echo "ERROR: Forbidden dependency found in mesh-client"
            grep -E "^[[:space:]│├└─-]*($FORBIDDEN)([[:space:]]|$)" /tmp/mesh-client-deps.txt
            exit 1
          fi

      - name: Ensure ABI cache directory
        run: mkdir -p "$LLAMA_STAGE_BUILD_DIR"

      - name: Cache patched llama.cpp ABI build
        id: llama_cache
        uses: actions/cache@v5
        with:
          path: .deps/llama.cpp/build-stage-abi-static
          key: ${{ env.CACHE_NAMESPACE }}-${{ runner.os }}-skippy-abi-cpu-${{ hashFiles('scripts/build-llama.sh', 'third_party/llama.cpp/upstream.txt', 'third_party/llama.cpp/patches/**', 'Justfile', '.github/cache-version.txt') }}

      - name: Prepare patched llama.cpp ABI checkout
        if: ${{ steps.llama_cache.outputs.cache-hit != 'true' }}
        run: scripts/prepare-llama.sh pinned

      - name: Build patched llama.cpp ABI libraries
        if: ${{ steps.llama_cache.outputs.cache-hit != 'true' }}
        run: scripts/build-llama.sh

      - name: Build mesh-llm binary (debug)
        run: cargo build -p mesh-llm --bin mesh-llm

      - name: CLI smoke test
        run: |
          target/debug/mesh-llm --log-format json --version
          target/debug/mesh-llm --log-format json --help | head -5

      - name: Upload Linux inference binary
        uses: actions/upload-artifact@v6
        with:
          name: ci-linux-inference-binaries
          path: target/debug/mesh-llm
          if-no-files-found: error
          retention-days: 1

      - name: Show sccache stats
        if: ${{ always() }}
        run: |
          sccache --show-stats || true
          requests="$(sccache --show-stats 2>/dev/null | awk '/Compile requests/ { print $3; exit }')"
          if [ "${requests:-0}" = "0" ]; then
            echo "::warning::sccache reported zero compile requests; check RUSTC_WRAPPER wiring if this was not a fully reused target cache."
          fi

  linux_targets:
    needs: changes
    if: ${{ (github.event_name == 'workflow_dispatch' || needs.changes.outputs.backend_changed == 'true' || needs.changes.outputs.benchmarks == 'true') && needs.changes.outputs.docs_only != 'true' }}
    name: Linux ${{ matrix.name }}
    runs-on: ${{ fromJson(vars.USE_SELF_HOSTED == 'true' && matrix.self_hosted_runs_on || matrix.runs_on) }}
    container:
      image: ${{ matrix.container }}
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    defaults:
      run:
        shell: bash
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: CUDA slim
            backend: cuda
            container: ghcr.io/mesh-llm/mesh-llm-cuda-runner@sha256:c5b85ef527230f77cf9933ef40bcb44316f9bbcb8fd2ce0651b58acda5143dfd
            cache_key: linux-cuda-slim
            runs_on: '["ubuntu-24.04"]'
            self_hosted_runs_on: '["self-hosted","Linux","X64","amd64","gpu-nvidia"]'
          - name: ROCm slim
            backend: rocm
            container: ghcr.io/mesh-llm/mesh-llm-cuda-runner@sha256:6b88ca9371ada2c507d6e36b71f0e0538fee378c6a5e2b39c17249b4b7e5088a
            cache_key: linux-rocm-slim
            build_dir: .deps/llama-build/build-stage-abi-rocm-gfx1100
            amdgpu_targets: gfx1100
            runs_on: '"ubuntu-24.04"'
          - name: Vulkan
            backend: vulkan
            container: ghcr.io/mesh-llm/mesh-llm-cuda-runner@sha256:ce55fed5c680cd3184b5d4770d9a77c43a702687690906e5753efd2cea27ed80
            cache_key: linux-vulkan
            build_dir: .deps/llama-build/build-stage-abi-vulkan
            runs_on: '"ubuntu-24.04"'
    env:
      RUN_LINUX_BACKEND: ${{ github.event_name == 'workflow_dispatch' || needs.changes.outputs.backend_changed == 'true' || needs.changes.outputs.benchmarks == 'true' }}
      LLAMA_STAGE_BACKEND: ${{ matrix.backend }}
      LLAMA_STAGE_BUILD_DIR: ${{ matrix.build_dir }}
      LLAMA_STAGE_AMDGPU_TARGETS: ${{ matrix.amdgpu_targets }}
      MESH_LLM_SKIP_UI: "1"
      MESH_LLM_REQUIRE_SCCACHE: "1"
      RUSTC_WRAPPER: sccache
      SCCACHE_GHA_ENABLED: "false"
      GGML_CUDA_NO_VMM: "1"
      LLAMA_STAGE_SKIP_NCCL: "1"
    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: false
      - name: Verify prebuilt backend environment
        if: ${{ env.RUN_LINUX_BACKEND == 'true' }}
        run: verify-runner-image public "${{ matrix.backend }}"
      - name: Skip Linux backend build
        if: ${{ env.RUN_LINUX_BACKEND != 'true' }}
        run: echo "Skipping Linux ${{ matrix.name }} backend build; backend inputs did not change."
      - name: Configure Linux Rust linker
        if: ${{ env.RUN_LINUX_BACKEND == 'true' }}
        run: |
          mkdir -p .cargo
          cat > .cargo/config.toml <<'EOF'
          [target.x86_64-unknown-linux-gnu]
          rustflags = ["-C", "link-arg=-fuse-ld=lld"]
          EOF
      - uses: Swatinem/rust-cache@v2
        if: ${{ env.RUN_LINUX_BACKEND == 'true' }}
        continue-on-error: true
        with:
          workspaces: . -> target
          cache-bin: "false"
          prefix-key: ${{ env.CACHE_NAMESPACE }}-rust-${{ runner.os }}-${{ hashFiles('.github/cache-version.txt') }}
          shared-key: ${{ matrix.cache_key }}
          save-if: ${{ github.ref == 'refs/heads/main' }}
      - name: Prepare UI placeholder
        if: ${{ env.RUN_LINUX_BACKEND == 'true' }}
        run: mkdir -p crates/mesh-llm-ui/dist && printf '<html></html>' > crates/mesh-llm-ui/dist/index.html
      - name: Ensure Vulkan ABI cache directory
        if: ${{ env.RUN_LINUX_BACKEND == 'true' && matrix.backend == 'vulkan' }}
        run: mkdir -p "$LLAMA_STAGE_BUILD_DIR"
      - name: Cache Vulkan ABI build
        if: ${{ env.RUN_LINUX_BACKEND == 'true' && matrix.backend == 'vulkan' }}
        id: backend_llama_cache
        uses: actions/cache@v5
        with:
          path: .deps/llama-build/build-stage-abi-vulkan
          key: ${{ env.CACHE_NAMESPACE }}-${{ runner.os }}-skippy-abi-vulkan-${{ hashFiles('scripts/build-linux.sh', 'scripts/build-llama.sh', 'third_party/llama.cpp/upstream.txt', 'third_party/llama.cpp/patches/**', 'Justfile', '.github/cache-version.txt') }}
      - name: Build Linux CUDA backend
        if: ${{ env.RUN_LINUX_BACKEND == 'true' && matrix.backend == 'cuda' }}
        env:
          MESH_CUDA_VERSION: "12.9.2"
        run: just --shell bash --shell-arg -lc release-build-cuda
      - name: Build Linux ROCm backend
        if: ${{ env.RUN_LINUX_BACKEND == 'true' && matrix.backend == 'rocm' }}
        run: |
          export CMAKE_PREFIX_PATH="/opt/rocm:${CMAKE_PREFIX_PATH:-}"
          just --shell bash --shell-arg -lc release-build-rocm gfx1100
      - name: Build Linux Vulkan backend
        if: ${{ env.RUN_LINUX_BACKEND == 'true' && matrix.backend == 'vulkan' && steps.backend_llama_cache.outputs.cache-hit != 'true' }}
        run: just --shell bash --shell-arg -lc release-build-vulkan
      - name: Build Linux Vulkan binary only
        if: ${{ env.RUN_LINUX_BACKEND == 'true' && matrix.backend == 'vulkan' && steps.backend_llama_cache.outputs.cache-hit == 'true' }}
        run: cargo build --release -p mesh-llm
      - name: Linux CUDA CLI smoke test
        if: ${{ env.RUN_LINUX_BACKEND == 'true' && matrix.backend == 'cuda' }}
        run: |
          cuda_stub_runtime="$(mktemp -d)"
          ln -s /usr/local/cuda/lib64/stubs/libcuda.so "$cuda_stub_runtime/libcuda.so.1"
          export LD_LIBRARY_PATH="$cuda_stub_runtime:/usr/local/cuda/lib64/stubs:${LD_LIBRARY_PATH:-}"
          target/release/mesh-llm --log-format json --version
      - name: Linux ROCm CLI smoke test
        if: ${{ env.RUN_LINUX_BACKEND == 'true' && matrix.backend == 'rocm' }}
        run: |
          export LD_LIBRARY_PATH="/opt/rocm/lib:${LD_LIBRARY_PATH:-}"
          target/release/mesh-llm --log-format json --version
      - name: Linux Vulkan CLI smoke test
        if: ${{ env.RUN_LINUX_BACKEND == 'true' && matrix.backend == 'vulkan' }}
        run: target/release/mesh-llm --log-format json --version
      - name: Show sccache stats
        if: ${{ env.RUN_LINUX_BACKEND == 'true' && (always()) }}
        run: |
          sccache --show-stats || true
          requests="$(sccache --show-stats 2>/dev/null | awk '/Compile requests/ { print $3; exit }')"
          if [ "${requests:-0}" = "0" ]; then
            echo "::warning::sccache reported zero compile requests; check RUSTC_WRAPPER wiring if this was not a fully reused target cache."
          fi

  rust_crate_tests:
    needs: changes
    if: ${{ needs.changes.outputs.rust_changed == 'true' && needs.changes.outputs.docs_only != 'true' }}
    name: Rust crate tests (${{ matrix.batch.idx }})
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: read
    container:
      image: ghcr.io/mesh-llm/mesh-llm-cuda-runner@sha256:8d93de6ba30173e825a16fdecf011f9c632edc6e1259df7289e491b0a05f829d
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    defaults:
      run:
        shell: bash
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        batch: ${{ fromJson(needs.changes.outputs.test_batches_json) }}
    env:
      LLAMA_STAGE_BACKEND: cpu
      LLAMA_STAGE_BUILD_DIR: .deps/llama.cpp/build-stage-abi-static
      MESH_LLM_SKIP_UI: "1"
      RUSTFLAGS: "-C link-arg=-fuse-ld=lld"
      RUSTC_WRAPPER: sccache
      SCCACHE_GHA_ENABLED: "false"
    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: false
      - name: Verify prebuilt CI environment
        run: verify-runner-image public
      - uses: Swatinem/rust-cache@v2
        continue-on-error: true
        with:
          workspaces: . -> target
          cache-bin: "false"
          prefix-key: ${{ env.CACHE_NAMESPACE }}-rust-${{ runner.os }}-${{ hashFiles('.github/cache-version.txt') }}
          shared-key: pr-rust-crate-tests-${{ matrix.batch.idx }}
          save-if: "false"
      - name: Prepare UI placeholder
        run: mkdir -p crates/mesh-llm-ui/dist && printf '<html></html>' > crates/mesh-llm-ui/dist/index.html
      - name: Prepare patched llama.cpp source checkout
        if: ${{ contains(matrix.batch.crates, 'skippy-quantize') }}
        run: scripts/prepare-llama.sh pinned
      - name: Ensure ABI cache directory
        run: mkdir -p "$LLAMA_STAGE_BUILD_DIR"
      - name: Cache patched llama.cpp ABI build
        id: rust_tests_llama_cache
        uses: actions/cache@v5
        with:
          path: .deps/llama.cpp/build-stage-abi-static
          key: ${{ env.CACHE_NAMESPACE }}-${{ runner.os }}-skippy-abi-cpu-${{ hashFiles('scripts/build-llama.sh', 'third_party/llama.cpp/upstream.txt', 'third_party/llama.cpp/patches/**', 'Justfile', '.github/cache-version.txt') }}
      - name: Prepare patched llama.cpp ABI checkout
        if: ${{ steps.rust_tests_llama_cache.outputs.cache-hit != 'true' }}
        run: scripts/prepare-llama.sh pinned
      - name: Build patched llama.cpp ABI libraries
        if: ${{ steps.rust_tests_llama_cache.outputs.cache-hit != 'true' }}
        run: scripts/build-llama.sh
      - name: Run crate tests
        env:
          TEST_CRATES: ${{ toJson(matrix.batch.crates) }}
        run: |
          mapfile -t crates < <(jq -r '.[]' <<<"$TEST_CRATES")
          for crate in "${crates[@]}"; do
            echo "::group::cargo test -p $crate"
            cargo test -p "$crate"
            echo "::endgroup::"
          done
      - name: Show sccache stats
        if: ${{ always() }}
        run: sccache --show-stats || true

  linux_test_groups:
    needs: [changes, linux_cpu_artifact]
    if: ${{ needs.linux_cpu_artifact.result == 'success' && needs.changes.outputs.docs_only != 'true' && needs.changes.outputs.linux_inference_artifact_required == 'true' }}
    name: Linux tests (${{ matrix.group }})
    runs-on: ubuntu-24.04
    container:
      image: ghcr.io/mesh-llm/mesh-llm-cuda-runner@sha256:8d93de6ba30173e825a16fdecf011f9c632edc6e1259df7289e491b0a05f829d
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    defaults:
      run:
        shell: bash
    strategy:
      fail-fast: false
      matrix:
        include:
          - group: protocol
            cache_key: linux-tests-protocol
          - group: skippy-smoke
            cache_key: linux-tests-skippy-smoke
    env:
      AFFECTED: ${{ needs.changes.outputs.affected_crates }}
      ALL_RUST: ${{ needs.changes.outputs.all_rust }}
      LLAMA_STAGE_BACKEND: cpu
      LLAMA_STAGE_BUILD_DIR: .deps/llama.cpp/build-stage-abi-static
      MESH_LLM_SKIP_UI: "1"
      MESH_LLM_REQUIRE_SCCACHE: "1"
      RUSTC_WRAPPER: sccache
      SCCACHE_GHA_ENABLED: "false"
    steps:
      - uses: actions/checkout@v5

      - name: Verify prebuilt CI environment
        run: verify-runner-image public

      - name: Configure Linux Rust linker
        run: |
          mkdir -p .cargo
          cat > .cargo/config.toml <<'EOF'
          [target.x86_64-unknown-linux-gnu]
          rustflags = ["-C", "link-arg=-fuse-ld=lld"]
          EOF

      - uses: Swatinem/rust-cache@v2
        continue-on-error: true
        with:
          workspaces: . -> target
          cache-bin: "false"
          prefix-key: ${{ env.CACHE_NAMESPACE }}-rust-${{ runner.os }}-${{ hashFiles('.github/cache-version.txt') }}
          shared-key: ${{ matrix.cache_key }}
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - name: Ensure ABI cache directory
        run: mkdir -p "$LLAMA_STAGE_BUILD_DIR"

      - name: Cache patched llama.cpp ABI build
        id: llama_cache
        uses: actions/cache@v5
        with:
          path: .deps/llama.cpp/build-stage-abi-static
          key: ${{ env.CACHE_NAMESPACE }}-${{ runner.os }}-skippy-abi-cpu-${{ hashFiles('scripts/build-llama.sh', 'third_party/llama.cpp/upstream.txt', 'third_party/llama.cpp/patches/**', 'Justfile', '.github/cache-version.txt') }}

      - name: Prepare patched llama.cpp ABI checkout
        if: ${{ steps.llama_cache.outputs.cache-hit != 'true' }}
        run: scripts/prepare-llama.sh pinned

      - name: Build patched llama.cpp ABI libraries
        if: ${{ steps.llama_cache.outputs.cache-hit != 'true' }}
        run: scripts/build-llama.sh

      - name: Restore Skippy smoke model cache
        if: ${{ matrix.group == 'skippy-smoke' }}
        id: skippy_smoke_model_cache
        uses: actions/cache/restore@v5
        with:
          path: ${{ runner.temp }}/skippy-ci-smoke-models
          key: ${{ env.CACHE_NAMESPACE }}-${{ runner.os }}-skippy-ci-smoke-models-SmolLM2-135M-Instruct.Q4_K_M.gguf-Falcon-H1-0.5B-Instruct-Q4_K_M.gguf-${{ hashFiles('.github/cache-version.txt') }}
          restore-keys: |
            ${{ env.CACHE_NAMESPACE }}-${{ runner.os }}-skippy-ci-smoke-models-

      - name: Protocol compatibility matrix
        if: ${{ matrix.group == 'protocol' && (needs.changes.outputs.all_rust == 'true' || contains(fromJson(needs.changes.outputs.affected_crates || '[]'), 'mesh-llm') || contains(fromJson(needs.changes.outputs.affected_crates || '[]'), 'mesh-llm-protocol')) }}
        run: |
          cargo test -p mesh-llm --test protocol_compat_v0_client
          cargo test -p mesh-llm --test protocol_convert_matrix

      - name: Skippy smoke tests
        if: ${{ matrix.group == 'skippy-smoke' }}
        timeout-minutes: 45
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HUGGING_FACE_HUB_TOKEN: ${{ secrets.HF_TOKEN }}
          WORK_DIR: ${{ runner.temp }}/skippy-ci-smoke
          MODEL_DIR: ${{ runner.temp }}/skippy-ci-smoke-models
        run: scripts/skippy-ci-smoke.sh

      - name: Save Skippy smoke model cache
        if: ${{ matrix.group == 'skippy-smoke' && github.ref == 'refs/heads/main' && steps.skippy_smoke_model_cache.outputs.cache-hit != 'true' }}
        uses: actions/cache/save@v5
        with:
          path: ${{ runner.temp }}/skippy-ci-smoke-models
          key: ${{ steps.skippy_smoke_model_cache.outputs.cache-primary-key }}

      - name: Show sccache stats
        if: ${{ always() }}
        run: |
          if ! command -v sccache >/dev/null 2>&1; then
            echo "sccache not available; stats skipped"
            exit 0
          fi

          sccache --show-stats || true
          requests="$(sccache --show-stats 2>/dev/null | awk '/Compile requests/ { print $3; exit }')"
          if [ "${requests:-0}" = "0" ]; then
            echo "::warning::sccache reported zero compile requests; check RUSTC_WRAPPER wiring if this was not a fully reused target cache."
          fi

  linux_client_auto_boot:
    needs: [changes, linux_cpu_artifact]
    if: ${{ needs.linux_cpu_artifact.result == 'success' && needs.changes.outputs.linux_inference_artifact_required == 'true' && needs.changes.outputs.docs_only != 'true' }}
    name: Linux client-auto boot test
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5
      - name: Install client-auto smoke dependencies
        run: sudo apt-get update && sudo apt-get install -y curl jq python3
      - uses: actions/download-artifact@v6
        with:
          name: ci-linux-inference-binaries
          path: target/debug
      - name: Make mesh-llm executable
        run: chmod +x target/debug/mesh-llm
